<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>証券市場論 ○×予想問題</title><style>
:root{--bg:#f6f7fb;--card:#fff;--line:#e5e7eb;--text:#111827;--muted:#6b7280;--blue:#2563eb;--ok:#16a34a;--ng:#dc2626}
*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;color:var(--text)}
header{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line);z-index:3}.wrap{max-width:900px;margin:auto;padding:14px 16px}
h1{font-size:20px;margin:0}.panel,.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px;margin-top:16px}.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
select,button{font:inherit;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff}button{font-weight:800;cursor:pointer}.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.meta{display:flex;justify-content:space-between;color:var(--muted);font-size:13px}.q{font-size:22px;font-weight:800;line-height:1.7;margin:18px 0}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:12px}.judge{font-size:28px;padding:18px}.maru{color:#166534}.batsu{color:#991b1b}
.feedback{margin-top:16px;padding:14px;border-radius:12px;display:none;line-height:1.65}.ok{display:block;background:#f0fdf4;color:#166534}.ng{display:block;background:#fef2f2;color:#991b1b}
.progress{height:10px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin-top:12px}.bar{height:100%;background:var(--blue);width:0}
.hidden{display:none}.actions{text-align:right;margin-top:14px}.score{font-size:54px;font-weight:900;text-align:center}.small{color:var(--muted);font-size:14px}
</style></head><body><header><div class="wrap"><h1>証券市場論1　○×予想問題</h1></div></header><main class="wrap">
<section id="setup" class="panel"><div class="controls"><select id="cat"></select><select id="count"><option>20</option><option>40</option><option value="999">全問</option></select><label><input type="checkbox" id="wrongOnly">誤答だけ</label><button id="start" class="primary">開始</button></div></section>
<div class="progress"><div id="bar" class="bar"></div></div>
<section id="quiz" class="card hidden"><div class="meta"><span id="mcat"></span><span id="mno"></span></div><div id="q" class="q"></div>
<div class="btns"><button id="trueBtn" class="judge maru">○</button><button id="falseBtn" class="judge batsu">×</button></div>
<div id="fb" class="feedback"></div><div class="actions"><button id="next" class="primary hidden">次へ</button></div></section>
<section id="result" class="card hidden"></section></main>
<script>
const ALL=[{"cat": "金融取引の基礎", "q": "銀行借入は、最終的な貸し手と借り手の間に金融仲介機関が介在するため、間接金融である。", "ans": true, "exp": "銀行が仲介するので間接金融です。"}, {"cat": "金融取引の基礎", "q": "社債や株式を発行することを証券の発行という。", "ans": true, "exp": "社債・株式はいずれも証券です。"}, {"cat": "金融取引の基礎", "q": "預金は、最終的な借り手が発行する本源的証券である。", "ans": false, "exp": "預金は金融仲介機関が発行する間接証券です。"}, {"cat": "金融取引の基礎", "q": "銀行借入は、本源的証券を発行して契約を締結するとみなせる。", "ans": true, "exp": "借用証書を本源的証券と考えます。"}, {"cat": "金融取引の基礎", "q": "市場型取引では、取引価格や取引金利は需要と供給が均衡するように決まる。", "ans": true, "exp": "株式市場や債券市場が代表例です。"}, {"cat": "金融取引の基礎", "q": "相対型取引では、企業や家計が不特定多数の相手と同時に取引する。", "ans": false, "exp": "特定の金融機関と1対1で取引します。"}, {"cat": "金融取引の基礎", "q": "発行市場は、既に発行された証券を投資家同士で売買する市場である。", "ans": false, "exp": "それは流通市場です。"}, {"cat": "金融取引の基礎", "q": "流通市場は、既発行証券を投資家間で売買する市場である。", "ans": true, "exp": "正しい説明です。"}, {"cat": "金融取引の基礎", "q": "長期金融市場には、債券市場・株式市場・金融派生商品市場が含まれる。", "ans": true, "exp": "1年超の取引を中心とする市場です。"}, {"cat": "金融取引の基礎", "q": "コール市場は長期金融市場に分類される。", "ans": false, "exp": "短期金融市場です。"}, {"cat": "短期金融市場", "q": "インターバンク市場には、原則として金融機関だけが参加する。", "ans": true, "exp": "銀行・証券会社・短資会社などが参加します。"}, {"cat": "短期金融市場", "q": "インターバンク市場の中心は無担保コール翌日物である。", "ans": true, "exp": "日銀の誘導対象でもあります。"}, {"cat": "短期金融市場", "q": "CPは譲渡性預金を意味する。", "ans": false, "exp": "CPはコマーシャル・ペーパーです。譲渡性預金はCDです。"}, {"cat": "短期金融市場", "q": "CPは優良企業が資金調達のために発行する短期社債である。", "ans": true, "exp": "正しい説明です。"}, {"cat": "短期金融市場", "q": "TDBは国庫短期証券である。", "ans": true, "exp": "Treasury Discount Billsです。"}, {"cat": "短期金融市場", "q": "債券レポ取引では、現金を担保に債券を貸し借りする。", "ans": true, "exp": "現金担保付債券貸借取引です。"}, {"cat": "短期金融市場", "q": "債券現先取引で資金調達する側は、取引開始時に債券を買う。", "ans": false, "exp": "債券を売って現金を受け取ります。"}, {"cat": "短期金融市場", "q": "日本の債券レポ取引は、グローバル・スタンダードな取引である。", "ans": false, "exp": "グローバル標準は債券現先取引です。"}, {"cat": "金融政策", "q": "日本銀行の役割には、紙幣の発行・物価の安定・決済システムの安定がある。", "ans": true, "exp": "講義の重要事項です。"}, {"cat": "金融政策", "q": "物価が持続的に上昇することをデフレーションという。", "ans": false, "exp": "インフレーションです。"}, {"cat": "金融政策", "q": "中央銀行は物価の安定を直接完全にコントロールできる。", "ans": false, "exp": "操作目標・中間目標を通じて間接的に目指します。"}, {"cat": "金融政策", "q": "マネタリーベース・準備預金量・短期金利は操作目標の例である。", "ans": true, "exp": "中央銀行が比較的直接コントロールできる変数です。"}, {"cat": "金融政策", "q": "マネーストックは操作目標に分類される。", "ans": false, "exp": "中間目標の例です。"}, {"cat": "金融政策", "q": "必要準備率を引き下げると、一般に銀行の貸出余力は増える。", "ans": true, "exp": "拘束される準備が減るためです。"}, {"cat": "金融政策", "q": "市場に資金を供給すると、一般に短期金利は上昇する。", "ans": false, "exp": "通常は低下します。"}, {"cat": "金融政策", "q": "市場から資金を吸収すると、一般に短期金利は上昇する。", "ans": true, "exp": "資金が不足しやすくなるためです。"}, {"cat": "金融政策", "q": "公開市場操作の誘導対象は、無担保コール翌日物金利である。", "ans": true, "exp": "主要な政策金利です。"}, {"cat": "金融政策", "q": "フォワード・ガイダンスは、将来の政策方針を示して長期金利等に影響を与える。", "ans": true, "exp": "期待を通じて働きかけます。"}, {"cat": "金融政策", "q": "量的緩和は、日銀当座預金残高やマネタリーベースの増加を重視する。", "ans": true, "exp": "正しい説明です。"}, {"cat": "金融政策", "q": "量的緩和政策は、ETFやJ-REITだけを増やす政策である。", "ans": false, "exp": "中心は量の拡大で、ETF等だけではありません。"}, {"cat": "債券の基礎", "q": "債券購入者は、経済的には現在お金を貸して将来お金を受け取る。", "ans": true, "exp": "債券投資の基本です。"}, {"cat": "債券の基礎", "q": "債券が発行されてから元本が返済されるまでの期間を残存期間という。", "ans": false, "exp": "発行から返済までは償還期限・満期。購入時点から満期までが残存期間です。"}, {"cat": "債券の基礎", "q": "既発債の購入日から満期までの期間を残存期間という。", "ans": true, "exp": "正しい説明です。"}, {"cat": "債券の基礎", "q": "債券の額面金額は、講義上の慣行では100円として扱う。", "ans": true, "exp": "計算問題では100円基準です。"}, {"cat": "債券の基礎", "q": "利率は、購入価格に対する年間利子の割合である。", "ans": false, "exp": "額面金額に対する年間利子の割合です。"}, {"cat": "債券の基礎", "q": "割引債は、額面より低い価格で発行し、償還差益を利子とみなす。", "ans": true, "exp": "正しい説明です。"}, {"cat": "債券の基礎", "q": "割引債には毎年クーポンが支払われる。", "ans": false, "exp": "通常クーポンはありません。"}, {"cat": "債券の基礎", "q": "変動利付債は、その時々の基準金利によって利子が変動する。", "ans": true, "exp": "元本ではなく利子が変動します。"}, {"cat": "債券の基礎", "q": "物価連動国債は、CPIに連動して元本と利子が変動する。", "ans": true, "exp": "講義上の整理です。"}, {"cat": "債券の基礎", "q": "格付とは、債券の元本や利息が約定通り支払われる確実性を第三者が評価したものだ。", "ans": true, "exp": "信用リスク評価です。"}, {"cat": "債券の基礎", "q": "社債の利回りは、国債より低くなるのが一般的である。", "ans": false, "exp": "信用リスクがあるため一般に高くなります。"}, {"cat": "債券価格と利回り", "q": "市場金利が上昇すると、既発債価格は上昇する。", "ans": false, "exp": "下落します。"}, {"cat": "債券価格と利回り", "q": "市場金利が低下すると、既発債価格は上昇する。", "ans": true, "exp": "逆相関です。"}, {"cat": "債券価格と利回り", "q": "クーポンレートと割引率が等しい利付債の価格は、額面と等しくなる。", "ans": true, "exp": "パー価格です。"}, {"cat": "債券価格と利回り", "q": "複利最終利回りがクーポンレートを上回る場合、債券価格は額面を上回る。", "ans": false, "exp": "額面を下回ります。"}, {"cat": "債券価格と利回り", "q": "直接利回りはインカム・ゲインだけを購入価格で割った指標である。", "ans": true, "exp": "キャピタル・ゲインは含みません。"}, {"cat": "債券価格と利回り", "q": "最終利回りは、既発債を購入して満期まで保有すると仮定した利回りである。", "ans": true, "exp": "正しい説明です。"}, {"cat": "債券価格と利回り", "q": "割引債ではクーポン再投資効果を考慮する必要がある。", "ans": false, "exp": "クーポンがないため不要です。"}, {"cat": "デュレーション", "q": "デュレーションは、債券キャッシュフローの平均回収年数を表す。", "ans": true, "exp": "一つ目の意味です。"}, {"cat": "デュレーション", "q": "デュレーションは、金利変動に対する債券価格の感応度も表す。", "ans": true, "exp": "二つ目の意味です。"}, {"cat": "デュレーション", "q": "同じ満期・割引率なら、クーポンが大きいほどデュレーションは大きい。", "ans": false, "exp": "小さくなります。"}, {"cat": "デュレーション", "q": "同じクーポン・割引率なら、満期が長いほどデュレーションは大きい。", "ans": true, "exp": "一般に正しいです。"}, {"cat": "デュレーション", "q": "割引債のデュレーションは残存年数に一致する。", "ans": true, "exp": "満期時に一括回収だからです。"}, {"cat": "デュレーション", "q": "同じ残存年数なら、利付債のデュレーションは割引債より大きい。", "ans": false, "exp": "途中回収があるため小さいです。"}, {"cat": "デュレーション", "q": "デュレーションが大きいほど、同じ金利変化に対する価格変化率は大きい。", "ans": true, "exp": "金利感応度が高いです。"}, {"cat": "外国為替", "q": "1ドル=160円という表示は、日本では自国通貨建てである。", "ans": true, "exp": "外国通貨1単位を何円で表す方式です。"}, {"cat": "外国為替", "q": "1ドル=125円から150円になることは円高である。", "ans": false, "exp": "円安です。"}, {"cat": "外国為替", "q": "円高になると、日本人は外国の財・サービスを購入しやすくなる。", "ans": true, "exp": "円の購買力が上がります。"}, {"cat": "外国為替", "q": "円安になると、外国人は日本の財・サービスを購入しやすくなる。", "ans": true, "exp": "外国通貨から見て安くなります。"}, {"cat": "外国為替", "q": "外国為替市場では、すべての主要市場が24時間営業している。", "ans": false, "exp": "各市場は所定時間ですが、世界で中心が移るため24時間取引できます。"}, {"cat": "外国為替", "q": "金融機関同士が為替取引を行う市場をインターバンク市場という。", "ans": true, "exp": "正しい説明です。"}, {"cat": "外国為替", "q": "異なる2通貨の対ドル相場から求める直接交換レートをクロスレートという。", "ans": true, "exp": "正しい説明です。"}, {"cat": "外国為替", "q": "SWIFTは外為決済リスクそのものを削減する決済制度である。", "ans": false, "exp": "SWIFTはメッセージング網。決済リスク削減はCLSです。"}, {"cat": "外国為替", "q": "CLS決済は外為決済リスクを削減する仕組みである。", "ans": true, "exp": "通貨の一方だけが支払われないリスクを抑えます。"}, {"cat": "外国為替", "q": "先物為替取引は、契約時に決めた条件で将来外貨を受け渡す取引である。", "ans": true, "exp": "正しい説明です。"}, {"cat": "外国為替", "q": "直物相場と先物相場の差をスプレッドまたはスワップポイントという。", "ans": true, "exp": "講義上の表現です。"}, {"cat": "外国為替", "q": "金利の高い通貨は先物プレミアムになる。", "ans": false, "exp": "低金利通貨が先物プレミアムです。"}, {"cat": "外国為替", "q": "先物相場と直物相場の価格差が金利差に一致する状態を金利平価という。", "ans": true, "exp": "正しい説明です。"}, {"cat": "購買力平価", "q": "購買力平価説では、自由貿易のもとで長期的に2国間の財・サービス価格が均衡する水準で為替が決まる。", "ans": true, "exp": "正しい説明です。"}, {"cat": "購買力平価", "q": "米国の物価だけが上昇した場合、購買力平価ではドル高・円安になる。", "ans": false, "exp": "ドルの購買力が下がるのでドル安・円高方向です。"}, {"cat": "購買力平価", "q": "貿易黒字国の通貨価値は上がりやすいと考えられる。", "ans": true, "exp": "黒字国通貨への買い需要が生じやすいためです。"}, {"cat": "預金・貸出", "q": "銀行から見て、預金は資産、貸出は負債である。", "ans": false, "exp": "預金は負債、貸出は資産です。"}, {"cat": "預金・貸出", "q": "当座預金・普通預金・決済用預金は要求払い預金に含まれる。", "ans": true, "exp": "預金者の要求に応じて払い戻されます。"}, {"cat": "預金・貸出", "q": "譲渡性預金と外貨預金は預金保険制度の保護対象外である。", "ans": true, "exp": "重要な例外です。"}, {"cat": "預金・貸出", "q": "手形割引とは、銀行が満期までの利息を差し引いて手形を買い取る取引である。", "ans": true, "exp": "正しい説明です。"}, {"cat": "預金・貸出", "q": "コミットメント契約では、あらかじめ定めた貸出枠内なら企業の請求に応じて貸出実行を約束する。", "ans": true, "exp": "正しい説明です。"}, {"cat": "預金・貸出", "q": "マネーストックは、金融部門から経済全体に供給されている通貨の総量である。", "ans": true, "exp": "正しい説明です。"}, {"cat": "預金・貸出", "q": "銀行貸出と預金の連鎖により当初以上の預金が生まれることを信用創造という。", "ans": true, "exp": "正しい説明です。"}, {"cat": "国債・社債", "q": "建設国債は四条国債とも呼ばれる。", "ans": true, "exp": "財政法4条に基づきます。"}, {"cat": "国債・社債", "q": "特例国債は公共事業費に限定して発行される。", "ans": false, "exp": "歳入不足を補う赤字国債です。"}, {"cat": "国債・社債", "q": "財投機関債には政府保証が付いている。", "ans": false, "exp": "政府保証はありません。"}, {"cat": "国債・社債", "q": "政府保証債は、政府が元利払いを保証する。", "ans": true, "exp": "正しい説明です。"}, {"cat": "国債・社債", "q": "現在は、すべての会社が原則として社債を発行できる。", "ans": true, "exp": "旧来の適債基準による制限はありません。"}, {"cat": "国債・社債", "q": "国債の主要な発行形式は入札発行である。", "ans": true, "exp": "個人向け国債ではない点に注意。"}, {"cat": "国債・社債", "q": "引受募集では、売れ残った債券は発行体が必ず引き取る。", "ans": false, "exp": "引受会社が引き取ります。"}, {"cat": "国債・社債", "q": "引受シンジケート団とは、複数の引受会社が共同で引き受ける集まりである。", "ans": true, "exp": "正しい説明です。"}, {"cat": "国債・社債", "q": "債券流通市場のディーラー業務は主に証券会社が担う。", "ans": true, "exp": "顧客の相手方となって売買します。"}];let quiz=[],i=0,score=0,wrong=new Set(JSON.parse(localStorage.getItem('tfWrong')||'[]'));
const $=s=>document.querySelector(s);const cats=['全範囲',...new Set(ALL.map(x=>x.cat))];$('#cat').innerHTML=cats.map(x=>`<option>${x}</option>`).join('');
function shuf(a){return a.sort(()=>Math.random()-.5)}function start(){let p=ALL.map((x,id)=>({...x,id}));if($('#cat').value!=='全範囲')p=p.filter(x=>x.cat===$('#cat').value);if($('#wrongOnly').checked)p=p.filter(x=>wrong.has(x.id));quiz=shuf(p).slice(0,+$('#count').value);if(!quiz.length)return alert('問題がありません');i=0;score=0;$('#setup').classList.add('hidden');$('#quiz').classList.remove('hidden');render()}
function render(){let x=quiz[i];$('#mcat').textContent=x.cat;$('#mno').textContent=`${i+1}/${quiz.length}`;$('#q').textContent=x.q;$('#fb').className='feedback';$('#next').classList.add('hidden');$('#trueBtn').disabled=false;$('#falseBtn').disabled=false;$('#bar').style.width=`${i/quiz.length*100}%`}
function answer(v){let x=quiz[i],ok=v===x.ans;if(ok){score++;wrong.delete(x.id)}else wrong.add(x.id);localStorage.setItem('tfWrong',JSON.stringify([...wrong]));$('#trueBtn').disabled=$('#falseBtn').disabled=true;let f=$('#fb');f.className='feedback '+(ok?'ok':'ng');f.innerHTML=`<b>${ok?'正解':'不正解'}</b><br>正解：${x.ans?'○':'×'}<br>${x.exp}`;$('#next').classList.remove('hidden')}
$('#trueBtn').onclick=()=>answer(true);$('#falseBtn').onclick=()=>answer(false);$('#next').onclick=()=>{i++;if(i>=quiz.length)finish();else render()};$('#start').onclick=start;
function finish(){$('#quiz').classList.add('hidden');$('#result').classList.remove('hidden');$('#bar').style.width='100%';let pct=Math.round(score/quiz.length*100);$('#result').innerHTML=`<div class="score">${pct}点</div><p style="text-align:center">${score}/${quiz.length}問正解</p><p class="small" style="text-align:center">誤答は保存済みです。「誤答だけ」で復習できます。</p><div class="actions"><button onclick="location.reload()" class="primary">もう一度</button></div>`}
</script></body></html>
