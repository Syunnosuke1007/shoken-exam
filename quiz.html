<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>証券市場論1 予想問題アプリ</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;--accent:#2563eb;--ok:#16a34a;--ng:#dc2626;--warn:#d97706}
*{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;background:var(--bg);color:var(--text)}
header{position:sticky;top:0;z-index:5;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:12px 16px}
.wrap{max-width:980px;margin:auto}.top{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap}
h1{font-size:20px;margin:0}.stats{font-size:14px;color:var(--muted)}
main{max-width:980px;margin:20px auto;padding:0 16px 80px}
.panel,.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 3px 14px rgba(0,0,0,.04)}
.panel{padding:16px;margin-bottom:16px}
.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
select,button,input[type=number]{font:inherit;border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:white}
button{cursor:pointer;font-weight:700}button.primary{background:var(--accent);color:white;border-color:var(--accent)}button.ghost{background:white}
button:disabled{opacity:.45;cursor:not-allowed}.progress{height:10px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin-top:12px}.bar{height:100%;width:0;background:var(--accent);transition:.25s}
.card{padding:22px}.meta{display:flex;justify-content:space-between;color:var(--muted);font-size:13px;margin-bottom:14px}.q{font-size:21px;line-height:1.65;font-weight:800;margin-bottom:18px}
.choice{display:block;border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin:10px 0;cursor:pointer;transition:.15s}.choice:hover{border-color:#9ca3af;background:#f9fafb}.choice input{margin-right:10px;transform:scale(1.15)}
.choice.correct{border-color:var(--ok);background:#f0fdf4}.choice.wrong{border-color:var(--ng);background:#fef2f2}
.feedback{display:none;margin-top:16px;padding:14px;border-radius:12px;line-height:1.65}.feedback.ok{display:block;background:#f0fdf4;color:#166534}.feedback.ng{display:block;background:#fef2f2;color:#991b1b}
.actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap}
.hidden{display:none!important}.result{text-align:center;padding:28px}.score{font-size:52px;font-weight:900;margin:10px 0}.small{color:var(--muted);font-size:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px;margin-top:16px}.statbox{background:#f9fafb;border:1px solid var(--line);border-radius:12px;padding:12px}
.reviewItem{padding:14px 0;border-bottom:1px solid var(--line)}.reviewItem:last-child{border-bottom:0}.tag{display:inline-block;background:#eef2ff;color:#3730a3;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:700;margin-bottom:8px}
kbd{background:#111827;color:white;border-radius:6px;padding:2px 6px;font-size:12px}
@media(max-width:640px){.q{font-size:18px}.card{padding:16px}.actions button{flex:1}}
</style>
</head>
<body>
<header><div class="wrap top"><h1>証券市場論1 予想問題アプリ</h1><div class="stats" id="headerStats">全問演習モード</div></div></header>
<main>
<section id="setup" class="panel">
  <div class="controls">
    <label>出題範囲
      <select id="cat"></select>
    </label>
    <label>問題数
      <select id="count"><option>10</option><option>20</option><option>30</option><option value="999">全問</option></select>
    </label>
    <label><input type="checkbox" id="shuffle" checked> シャッフル</label>
    <label><input type="checkbox" id="wrongOnly"> 前回の誤答だけ</label>
    <button class="primary" id="start">開始</button>
    <button class="ghost" id="resetHistory">履歴リセット</button>
  </div>
  <div class="small" style="margin-top:10px">選択問題・複数選択・数値入力に対応。誤答は自動保存され、復習できます。</div>
</section>
<div class="progress"><div class="bar" id="bar"></div></div>
<section id="quiz" class="card hidden">
  <div class="meta"><span id="metaCat"></span><span id="metaNo"></span></div>
  <div class="q" id="q"></div>
  <div id="choices"></div>
  <div id="feedback" class="feedback"></div>
  <div class="actions">
    <button id="showAnswer" class="ghost">答えを見る</button>
    <button id="submit" class="primary">回答する</button>
    <button id="next" class="primary hidden">次へ</button>
  </div>
</section>
<section id="result" class="card hidden"></section>
</main>
<script>
const ALL = [{"type": "single", "cat": "金融市場の基礎", "q": "最終的な貸し手から最終的な借り手へ資金が流れる際に、金融仲介機関が介在する金融を何というか。", "choices": ["直接金融", "間接金融", "市場型金融", "相対金融"], "ans": [1], "exp": "銀行などの金融仲介機関が介在する場合は間接金融です。"}, {"type": "multi", "cat": "金融市場の基礎", "q": "本源的証券を発行して契約を締結するとみなせる金融取引をすべて選べ。", "choices": ["預金", "銀行借入", "社債発行", "新株発行"], "ans": [1, 2, 3], "exp": "銀行借入では借用証書、社債・新株発行ではそれぞれ債券・株式という本源的証券が発行されます。預金は銀行が発行する間接証券です。"}, {"type": "single", "cat": "金融市場の基礎", "q": "市場型取引の説明として正しいものはどれか。", "choices": ["特定の金融機関と1対1で取引する", "価格や金利は過去の取引関係だけで決まる", "株式市場や債券市場が代表例である", "貸出条件は常に一律である"], "ans": [2], "exp": "市場型取引には多数の主体が参加し、株式市場・債券市場が代表例です。"}, {"type": "multi", "cat": "金融市場の基礎", "q": "長期金融市場に該当するものをすべて選べ。", "choices": ["債券市場", "株式市場", "金融派生商品市場", "コール市場"], "ans": [0, 1, 2], "exp": "長期金融市場は1年超の取引で、債券・株式・金融派生商品市場が含まれます。コール市場は短期金融市場です。"}, {"type": "single", "cat": "金融市場の基礎", "q": "新たに発行される証券を投資家が購入する市場はどれか。", "choices": ["流通市場", "発行市場", "相対市場", "決済市場"], "ans": [1], "exp": "新規発行証券を売り出す市場が発行市場です。"}, {"type": "single", "cat": "金融市場の基礎", "q": "既に発行された証券を投資家間で売買する市場はどれか。", "choices": ["発行市場", "流通市場", "公募市場", "私募市場"], "ans": [1], "exp": "既発行証券の売買は流通市場で行われます。"}, {"type": "single", "cat": "金融市場の基礎", "q": "資金を借りた証拠として、利息の支払いと元本返済を約束して発行される証券を何というか。", "choices": ["株式", "債券", "預金証書", "小切手"], "ans": [1], "exp": "債券は、発行者が利息支払いと元本返済を約束して発行する債務証書です。"}, {"type": "single", "cat": "金融市場の基礎", "q": "特定の人に対して特定の行為を要求する権利を何というか。", "choices": ["債務", "債権", "格付", "償還"], "ans": [1], "exp": "要求する側の権利が債権、要求される側の義務が債務です。"}, {"type": "single", "cat": "金融市場の基礎", "q": "X氏がY銀行からお金を借りた。正しい関係はどれか。", "choices": ["X氏が債権者、Y銀行が債務者", "Y銀行が債権者、X氏が債務者", "両者とも債権者", "両者とも債務者"], "ans": [1], "exp": "返済を請求できるY銀行が債権者、返済義務を負うX氏が債務者です。"}, {"type": "single", "cat": "短期金融市場", "q": "インターバンク市場の中心的な取引はどれか。", "choices": ["約束手形", "有担保コール翌日物", "無担保コール翌日物", "CP"], "ans": [2], "exp": "無担保コール翌日物が中心で、その金利は日銀の誘導対象です。"}, {"type": "single", "cat": "短期金融市場", "q": "企業が資金調達のために発行する短期の社債を売買する市場はどれか。", "choices": ["CD市場", "CP市場", "TDB市場", "コール市場"], "ans": [1], "exp": "CPはCommercial Paperで、優良企業が発行する短期社債です。"}, {"type": "single", "cat": "短期金融市場", "q": "譲渡性預金を売買する市場はどれか。", "choices": ["CD市場", "CP市場", "TDB市場", "債券現先市場"], "ans": [0], "exp": "CDはCertificate of Deposit、譲渡性預金です。"}, {"type": "single", "cat": "短期金融市場", "q": "国庫短期証券を売買する市場はどれか。", "choices": ["CD市場", "CP市場", "TDB市場", "コール市場"], "ans": [2], "exp": "TDBはTreasury Discount Bills、国庫短期証券です。"}, {"type": "multi", "cat": "短期金融市場", "q": "現金担保付債券貸借取引（債券レポ）の説明として正しいものをすべて選べ。", "choices": ["現金を担保に主として国債を貸し借りする", "経済的には債券現先取引と同じ効果をもつ", "債券の借り手は現金を差し出す", "グローバル・スタンダードである"], "ans": [0, 1, 2], "exp": "日本型の債券レポは現金担保付債券貸借。経済効果は現先と同じですが、グローバル標準は債券現先取引です。"}, {"type": "single", "cat": "短期金融市場", "q": "債券現先取引で資金調達する側が取引開始時に行うことはどれか。", "choices": ["債券を貸す", "債券を借りる", "債券を売る", "債券を買う"], "ans": [2], "exp": "債券を売って現金を受け取り、将来買い戻すことで資金調達します。"}, {"type": "single", "cat": "金融政策", "q": "日銀の役割として空欄に入る語は何か。日本銀行券の発行、（　）の安定、決済システムの安定。", "choices": ["株価", "為替", "物価", "地価"], "ans": [2], "exp": "日銀の主要目的の一つは物価の安定です。"}, {"type": "multi", "cat": "金融政策", "q": "伝統的金融政策の操作目標に該当するものをすべて選べ。", "choices": ["マネーストック", "マネタリーベース", "準備預金量", "短期金利", "長期金利"], "ans": [1, 2, 3], "exp": "直接コントロール可能な操作目標はマネタリーベース、準備預金量、短期金利です。"}, {"type": "single", "cat": "金融政策", "q": "必要準備率を引き下げると、一般に金融機関の貸出余力はどうなるか。", "choices": ["増える", "減る", "変わらない", "必ずゼロになる"], "ans": [0], "exp": "拘束される準備が減り、貸出可能資金が増えます。"}, {"type": "single", "cat": "金融政策", "q": "公開市場操作で金融緩和を行う組み合わせはどれか。", "choices": ["市場へ資金供給→金利上昇", "市場へ資金供給→金利低下", "市場から資金吸収→金利低下", "市場から資金吸収→金利不変"], "ans": [1], "exp": "資金供給で市場の資金量が増えると、短期金利は低下しやすくなります。"}, {"type": "single", "cat": "金融政策", "q": "公開市場操作の主な誘導対象となる市場金利はどれか。", "choices": ["公定歩合", "無担保コール翌日物金利", "有担保コール翌日物金利", "10年国債金利のみ"], "ans": [1], "exp": "短期金融市場の無担保コール翌日物金利が主な誘導対象です。"}, {"type": "single", "cat": "金融政策", "q": "将来も低金利を継続すると市場に予想させ、長期金利の低下を促す政策はどれか。", "choices": ["量的緩和", "フォワード・ガイダンス", "信用緩和", "マイナス金利政策"], "ans": [1], "exp": "将来の政策方針を示すのがフォワード・ガイダンスです。"}, {"type": "multi", "cat": "金融政策", "q": "量的緩和政策が増大させようとするものをすべて選べ。", "choices": ["日銀当座預金残高", "マネタリーベース", "ETFやJ-REITの価格だけ", "CPや社債の発行額だけ"], "ans": [0, 1], "exp": "量的緩和は日銀当座預金残高・マネタリーベースの拡大を重視します。"}, {"type": "single", "cat": "金融政策", "q": "物価が持続的に上昇することを何というか。", "choices": ["デフレーション", "インフレーション", "スタグネーション", "ディスインフレーション"], "ans": [1], "exp": "物価の持続的上昇はインフレーションです。"}, {"type": "single", "cat": "債券の基礎", "q": "債券が発行されてから元本が返済されるまでの期間を何というか。", "choices": ["残存期間", "償還期限", "保有期間", "平均回収年数"], "ans": [1], "exp": "発行から返済までが償還期限・満期です。購入時点から満期までは残存期間です。"}, {"type": "single", "cat": "債券の基礎", "q": "既発債を購入した場合、購入日から満期までの期間を何というか。", "choices": ["償還期間", "発行期間", "残存期間", "募集期間"], "ans": [2], "exp": "購入時点から満期までが残存期間です。"}, {"type": "single", "cat": "債券の基礎", "q": "慣行として債券の額面金額はいくらとされるか。", "choices": ["10円", "100円", "1,000円", "10,000円"], "ans": [1], "exp": "講義上の計算では額面100円が基準です。"}, {"type": "single", "cat": "債券の基礎", "q": "債券の額面金額に対する1年当たりの利子の割合を何というか。", "choices": ["利回り", "割引率", "利率", "スポットレート"], "ans": [2], "exp": "利率はクーポンレートとも呼ばれ、額面に対する年間利子の割合です。"}, {"type": "single", "cat": "債券の基礎", "q": "満期3年、額面100円、年率10%、年2回払いの利付債で、3年間に受け取る総額はいくらか。", "choices": ["100円", "110円", "130円", "160円"], "ans": [2], "exp": "年間利子10円×3年=30円、元本100円を加えて130円です。"}, {"type": "multi", "cat": "債券の基礎", "q": "発行時点で利子額が確定しない利付債をすべて選べ。", "choices": ["固定利付債", "変動利付債", "割引債", "物価連動債"], "ans": [1, 3], "exp": "変動利付債は基準金利、物価連動債は物価指数に連動するため、将来の利子額が確定しません。"}, {"type": "single", "cat": "債券の基礎", "q": "割引債の説明として正しいものはどれか。", "choices": ["額面より高く発行し差額を利子とする", "額面より低く発行し償還時との差額を利子とする", "毎年必ずクーポンが支払われる", "元本が物価に連動する"], "ans": [1], "exp": "割引債は額面以下で発行され、償還差益が利子に相当します。"}, {"type": "single", "cat": "債券の基礎", "q": "債券などの元本・利息が約定通り支払われる確実性を第三者機関が評価し段階表示したものは何か。", "choices": ["格付", "利回り", "デュレーション", "信用創造"], "ans": [0], "exp": "信用力を段階評価するのが格付です。"}, {"type": "single", "cat": "債券の基礎", "q": "債券価格と市場金利の関係として正しいものはどれか。", "choices": ["金利上昇→債券価格上昇", "金利上昇→債券価格下落", "金利低下→債券価格下落", "両者は無関係"], "ans": [1], "exp": "市場金利が上がると、既発債の魅力が低下して価格は下がります。"}, {"type": "single", "cat": "国債・社債", "q": "国が税収などの収入で支出を賄いきれないとき、財政法4条に基づき公共事業費等に充てるため発行する国債は何か。", "choices": ["建設国債", "特例国債", "借換債", "財投債"], "ans": [0], "exp": "建設国債は四条国債とも呼ばれます。"}, {"type": "single", "cat": "国債・社債", "q": "建設国債でも歳入が不足する場合、特別法により発行される赤字国債は何か。", "choices": ["建設国債", "特例国債", "借換債", "復興債"], "ans": [1], "exp": "赤字国債は特例国債です。"}, {"type": "single", "cat": "国債・社債", "q": "2026年度当初予算の国債発行予定額で最も大きい区分はどれか。", "choices": ["新規国債", "復興債", "借換債", "財投債"], "ans": [2], "exp": "既存国債の償還資金を調達する借換債の比重が大きいです。"}, {"type": "single", "cat": "国債・社債", "q": "政府関係機関が発行し、政府保証が付かない債券を何というか。", "choices": ["政府保証債", "財投機関債", "財投債", "金融債"], "ans": [1], "exp": "政府保証がない政府関係機関債が財投機関債です。"}, {"type": "single", "cat": "国債・社債", "q": "現在の会社法上、社債を発行できる会社について正しい説明はどれか。", "choices": ["すべての会社が発行可能", "適債基準を満たす上場企業のみ", "10年以下だけ全会社が発行可能", "銀行のみ"], "ans": [0], "exp": "現在は原則としてすべての会社が社債を発行できます。"}, {"type": "single", "cat": "国債・社債", "q": "発行額の大きい債券を複数の引受会社で共同引受する集まりは何か。", "choices": ["カルテル", "コンソーシアム", "引受シンジケート団", "クレジットライン"], "ans": [2], "exp": "共同引受の集まりは引受シンジケート団です。"}, {"type": "multi", "cat": "国債・社債", "q": "引受募集の特徴として正しいものをすべて選べ。", "choices": ["発行予定総額の調達が発行体に保証される", "売れ残りは引受会社が引き取る", "売れ残りは必ず発行体が引き取る", "必ず資金調達に失敗する"], "ans": [0, 1], "exp": "引受会社が残額を引き受けるため、発行体は予定額を調達できます。"}, {"type": "single", "cat": "国債・社債", "q": "国債の主要な発行形式はどれか。", "choices": ["募集発行", "入札発行", "売出発行", "私募発行"], "ans": [1], "exp": "国債は原則として入札発行が中心です。"}, {"type": "single", "cat": "国債・社債", "q": "広く一般投資家を対象に債券を発行する方式は何か。", "choices": ["私募", "公募", "相対", "レポ"], "ans": [1], "exp": "一般投資家向けは公募、特定少数向けは私募です。"}, {"type": "single", "cat": "国債・社債", "q": "顧客の売買を円滑にするため、自ら売買相手となるディーラー業務を担う主体はどれか。", "choices": ["銀行", "生命保険会社", "年金基金", "証券会社"], "ans": [3], "exp": "債券流通市場では証券会社がディーラーとして自己売買します。"}, {"type": "single", "cat": "債券計算", "q": "現在価値とは何か。", "choices": ["現在の価値を将来の価値に換算したもの", "将来の価値を現在の価値に換算したもの", "現在と将来の差額", "元本だけの価値"], "ans": [1], "exp": "将来受け取る金額を割引率で現在に割り戻したものです。"}, {"type": "single", "cat": "債券計算", "q": "割引率2%のとき、現在の200万円の1年後の価値として最も近いものはどれか。", "choices": ["196万円", "200万円", "204万円"], "ans": [2], "exp": "200×1.02=204万円。"}, { let quiz=[], idx=0, correct=0, answered=false, userAnswers=[], wrongIds=new Set(JSON.parse(localStorage.getItem('wrongIds')||'[]'));
const $=s=>document.querySelector(s);
const cats=['全範囲',...new Set(ALL.map(x=>x.cat))];
$('#cat').innerHTML=cats.map(c=>`<option>${c}</option>`).join('');
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function start(){
 let pool=ALL.map((q,i)=>({...q,id:i}));
 const cat=$('#cat').value;
 if(cat!=='全範囲') pool=pool.filter(q=>q.cat===cat);
 if($('#wrongOnly').checked) pool=pool.filter(q=>wrongIds.has(q.id));
 if($('#shuffle').checked) shuffle(pool);
 const n=+$('#count').value; quiz=pool.slice(0,n);
 if(!quiz.length){alert('該当する問題がありません。');return}
 idx=0;correct=0;userAnswers=[];answered=false;
 $('#setup').classList.add('hidden');$('#result').classList.add('hidden');$('#quiz').classList.remove('hidden');
 render();
}
function render(){
 const x=quiz[idx];answered=false;
 $('#metaCat').textContent=x.cat;$('#metaNo').textContent=`${idx+1} / ${quiz.length}`;
 $('#headerStats').textContent=`正解 ${correct} / ${idx}`;
 $('#q').textContent=x.q;$('#feedback').className='feedback';$('#feedback').textContent='';
 $('#submit').classList.remove('hidden');$('#showAnswer').classList.remove('hidden');$('#next').classList.add('hidden');
 const box=$('#choices');box.innerHTML='';
 if(x.type==='number'){
   box.innerHTML=`<input id="numAns" type="number" step="any" placeholder="数値を入力" style="width:100%;max-width:300px">`;
 }else{
   x.choices.forEach((c,i)=>{
    const type=x.type==='multi'?'checkbox':'radio';
    const lab=document.createElement('label');lab.className='choice';
    lab.innerHTML=`<input type="${type}" name="ans" value="${i}">${c}`;
    box.appendChild(lab);
   });
 }
 $('#bar').style.width=`${idx/quiz.length*100}%`;
}
function selected(){
 const x=quiz[idx];
 if(x.type==='number'){const v=parseFloat($('#numAns').value);return Number.isFinite(v)?v:null}
 return [...document.querySelectorAll('input[name=ans]:checked')].map(e=>+e.value);
}
function isCorrect(x,s){
 if(x.type==='number') return s!==null && Math.abs(s-x.ans_num)<=x.tol;
 return JSON.stringify([...s].sort((a,b)=>a-b))===JSON.stringify([...x.ans].sort((a,b)=>a-b));
}
function mark(x,s,forced=false){
 if(answered)return; answered=true;
 const ok=!forced && isCorrect(x,s); if(ok)correct++;
 if(ok)wrongIds.delete(x.id); else wrongIds.add(x.id);
 localStorage.setItem('wrongIds',JSON.stringify([...wrongIds]));
 userAnswers.push({q:x,sel:s,ok});
 if(x.type!=='number'){
  document.querySelectorAll('.choice').forEach((lab,i)=>{
   if(x.ans.includes(i)) lab.classList.add('correct');
   if(s.includes?.(i)&&!x.ans.includes(i)) lab.classList.add('wrong');
   lab.querySelector('input').disabled=true;
  });
 }else $('#numAns').disabled=true;
 const answerText=x.type==='number'?`${x.ans_num}`:x.ans.map(i=>x.choices[i]).join('／');
 const f=$('#feedback');f.className='feedback '+(ok?'ok':'ng');
 f.innerHTML=`<b>${ok?'正解！':'不正解'}</b><br>答え：${answerText}<br>${x.exp}`;
 $('#submit').classList.add('hidden');$('#showAnswer').classList.add('hidden');$('#next').classList.remove('hidden');
 $('#headerStats').textContent=`正解 ${correct} / ${idx+1}`;
}
$('#submit').onclick=()=>{
 const s=selected(); const x=quiz[idx];

};
$('#showAnswer').onclick=()=>mark(quiz[idx], quiz[idx].type==='number'?null:[], true);
$('#next').onclick=()=>{idx++; if(idx>=quiz.length) finish(); else render()};
function finish(){
 $('#quiz').classList.add('hidden');$('#result').classList.remove('hidden');$('#bar').style.width='100%';
 const pct=Math.round(correct/quiz.length*100);
 const by={}; userAnswers.forEach(a=>{by[a.q.cat]??={n:0,c:0};by[a.q.cat].n++;if(a.ok)by[a.q.cat].c++});
 let html=`<div class="result"><div class="small">結果</div><div class="score">${pct}点</div><div>${correct} / ${quiz.length}問正解</div></div>`;
 html+=`<div class="grid">${Object.entries(by).map(([k,v])=>`<div class="statbox"><b>${k}</b><br>${v.c}/${v.n}問正解</div>`).join('')}</div>`;
 const wrong=userAnswers.filter(a=>!a.ok);
 if(wrong.length){
  html+=`<h3>誤答復習</h3>`+wrong.map(a=>`<div class="reviewItem"><span class="tag">${a.q.cat}</span><div><b>${a.q.q}</b></div><div class="small" style="margin-top:6px">答え：${a.q.type==='number'?a.q.ans_num:a.q.ans.map(i=>a.q.choices[i]).join('／')}<br>${a.q.exp}</div></div>`).join('');
 }
 html+=`<div class="actions"><button class="ghost" onclick="location.reload()">条件を変える</button><button class="primary" onclick="retryWrong()">今回の誤答だけ再挑戦</button></div>`;
 $('#result').innerHTML=html;$('#headerStats').textContent=`最終結果 ${pct}点`;
}
window.retryWrong=()=>{
 quiz=userAnswers.filter(a=>!a.ok).map(a=>a.q);
 if(!quiz.length){alert('誤答はありません。');return}
 idx=0;correct=0;userAnswers=[];$('#result').classList.add('hidden');$('#quiz').classList.remove('hidden');render();
}
$('#start').onclick=start;
$('#resetHistory').onclick=()=>{if(confirm('誤答履歴をリセットしますか？')){wrongIds.clear();localStorage.removeItem('wrongIds');alert('リセットしました')}}; 
</script>
</body>
