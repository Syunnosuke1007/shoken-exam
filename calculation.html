<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>証券市場論 計算問題</title><style>
:root{--bg:#f6f7fb;--line:#e5e7eb;--blue:#2563eb;--ok:#16a34a;--ng:#dc2626;--muted:#6b7280}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;color:#111827}
header{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:3}.wrap{max-width:900px;margin:auto;padding:14px 16px}h1{font-size:20px;margin:0}
.panel,.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px;margin-top:16px}.controls{display:flex;gap:10px;flex-wrap:wrap}
select,button,input{font:inherit;border:1px solid var(--line);border-radius:10px;padding:11px 12px}button{font-weight:800;cursor:pointer;background:#fff}.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.meta{display:flex;justify-content:space-between;color:var(--muted);font-size:13px}.q{font-size:22px;font-weight:800;line-height:1.7;margin:18px 0}
input{width:100%;max-width:320px;font-size:20px}.feedback{display:none;margin-top:16px;padding:14px;border-radius:12px;line-height:1.7}.ok{display:block;background:#f0fdf4;color:#166534}.ng{display:block;background:#fef2f2;color:#991b1b}
.actions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;margin-top:14px}.hidden{display:none}.score{font-size:54px;font-weight:900;text-align:center}.small{color:var(--muted);font-size:14px}.progress{height:10px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin-top:12px}.bar{height:100%;background:var(--blue);width:0}
.formulas{line-height:1.8}.formulas code{display:block;background:#111827;color:#fff;padding:10px;border-radius:9px;margin:8px 0;white-space:normal}
</style></head><body><header><div class="wrap"><h1>証券市場論1　計算問題アプリ</h1></div></header><main class="wrap">
<section id="setup" class="panel"><div class="controls"><select id="cat"></select><select id="count"><option>10</option><option>20</option><option value="999">全問</option></select><button id="start" class="primary">開始</button><button id="formulaBtn">公式一覧</button></div></section>
<section id="formulas" class="panel formulas hidden"><b>重要公式</b>
<code>将来価値 FV = PV × (1+r)^n</code><code>現在価値 PV = FV ÷ (1+r)^n</code>
<code>直接利回り = 年間クーポン ÷ 購入価格 × 100</code>
<code>単利最終利回り = {年間クーポン + (額面−購入価格)÷残存年数} ÷ 購入価格 ×100</code>
<code>先物相場 F = 直物相場 S × (1+円金利) ÷ (1+外貨金利)</code>
<code>クロスレート：通貨の向きをそろえて掛ける／割る</code></section>
<div class="progress"><div id="bar" class="bar"></div></div>
<section id="quiz" class="card hidden"><div class="meta"><span id="mcat"></span><span id="mno"></span></div><div id="q" class="q"></div><input id="ans" type="number" step="any" placeholder="数値のみ入力">
<div id="fb" class="feedback"></div><div class="actions"><button id="show">答えを見る</button><button id="submit" class="primary">回答</button><button id="next" class="primary hidden">次へ</button></div></section>
<section id="result" class="card hidden"></section></main><script>
const ALL=[{"cat": "現在価値・将来価値", "type": "number", "q": "割引率3%のとき、現在の300万円の1年後の価値を求めよ（万円）。", "ans": 309.0, "tol": 0.05, "exp": "300×1.03=309万円"}, {"cat": "現在価値・将来価値", "type": "number", "q": "割引率4%のとき、2年後の216万円の現在価値を求めよ（小数第1位、万円）。", "ans": 199.7, "tol": 0.1, "exp": "216÷1.04²=199.704...万円"}, {"cat": "現在価値・将来価値", "type": "number", "q": "割引率5%のとき、3年後の115.8万円の現在価値を求めよ（小数第1位、万円）。", "ans": 100.0, "tol": 0.15, "exp": "115.8÷1.05³≒100.0万円"}, {"cat": "債券価格", "type": "number", "q": "満期2年、額面100円、年1回クーポン4円、割引率4%の債券価格を求めよ（小数第1位、円）。", "ans": 100.0, "tol": 0.1, "exp": "4/1.04+104/1.04²=100円"}, {"cat": "債券価格", "type": "number", "q": "満期3年、額面100円、年1回クーポン6円、割引率5%の債券価格を求めよ（小数第1位、円）。", "ans": 102.7, "tol": 0.1, "exp": "6/1.05+6/1.05²+106/1.05³=102.723...円"}, {"cat": "債券価格", "type": "number", "q": "満期4年、額面100円の割引債を割引率3%で評価した価格を求めよ（小数第1位、円）。", "ans": 88.8, "tol": 0.1, "exp": "100/1.03⁴=88.849...円"}, {"cat": "直接利回り", "type": "number", "q": "年クーポン4円、購入価格96円の直接利回りを求めよ（小数第1位、%）。", "ans": 4.2, "tol": 0.1, "exp": "4÷96×100=4.166...%"}, {"cat": "直接利回り", "type": "number", "q": "年クーポン7円、購入価格92円の直接利回りを求めよ（小数第1位、%）。", "ans": 7.6, "tol": 0.1, "exp": "7÷92×100=7.608...%"}, {"cat": "単利最終利回り", "type": "number", "q": "額面100円、購入価格94円、残存3年、年クーポン5円の単利最終利回りを求めよ（小数第1位、%）。", "ans": 7.4, "tol": 0.1, "exp": "{5+(100-94)/3}÷94×100=7.446...%"}, {"cat": "単利最終利回り", "type": "number", "q": "額面100円、購入価格88円、残存4年、年クーポン4円の単利最終利回りを求めよ（小数第1位、%）。", "ans": 8.0, "tol": 0.1, "exp": "{4+(100-88)/4}÷88×100=7.954...%"}, {"cat": "単利最終利回り", "type": "number", "q": "額面100円、購入価格105円、残存5年、年クーポン6円の単利最終利回りを求めよ（小数第1位、%）。", "ans": 4.8, "tol": 0.1, "exp": "{6+(100-105)/5}÷105×100=4.761...%"}, {"cat": "割引債利回り", "type": "number", "q": "残存1年、額面100円、価格92円の割引債の複利利回りを求めよ（小数第1位、%）。", "ans": 8.7, "tol": 0.1, "exp": "100/92-1=0.086956..."}, {"cat": "割引債利回り", "type": "number", "q": "残存2年、額面100円、価格84円の割引債の複利年利回りを求めよ（小数第1位、%）。", "ans": 9.1, "tol": 0.1, "exp": "(100/84)^(1/2)-1=9.108...%"}, {"cat": "スポットレート", "type": "number", "q": "残存1年、年クーポン6円、額面100円、価格100円の1年スポットレートを求めよ（%）。", "ans": 6.0, "tol": 0.05, "exp": "100=106/(1+r1)よりr1=6%"}, {"cat": "スポットレート", "type": "number", "q": "1年スポットレートが5%のとき、残存1年、額面100円の割引債価格を求めよ（小数第1位、円）。", "ans": 95.2, "tol": 0.1, "exp": "100/1.05=95.238...円"}, {"cat": "スポットレート", "type": "number", "q": "1年スポットレート5%、2年スポットレート6%のとき、2年後100円の現在価値を求めよ（小数第1位、円）。", "ans": 89.0, "tol": 0.1, "exp": "100/1.06²=88.999...円"}, {"cat": "デュレーション", "type": "number", "q": "500円投資し、1年目100円、2年目150円、3年目250円を回収する。割引率0の平均回収年数を求めよ（小数第1位、年）。", "ans": 2.3, "tol": 0.1, "exp": "1×100/500+2×150/500+3×250/500=2.3年"}, {"cat": "デュレーション", "type": "number", "q": "400円投資し、1年目200円、2年目200円を回収する。割引率0の平均回収年数を求めよ（小数第1位、年）。", "ans": 1.5, "tol": 0.1, "exp": "1×200/400+2×200/400=1.5年"}, {"cat": "為替換算", "type": "number", "q": "1ドル=120円、1ユーロ=1.25ドルのとき、1ユーロは何円か。", "ans": 150.0, "tol": 0.05, "exp": "1.25×120=150円"}, {"cat": "為替換算", "type": "number", "q": "1ドル=140円、1ドル=0.8ユーロのとき、1ユーロは何円か。", "ans": 175.0, "tol": 0.05, "exp": "1ユーロ=1/0.8=1.25ドル、1.25×140=175円"}, {"cat": "外貨預金", "type": "number", "q": "1ドル=100円のとき100万円をドル預金（金利4%）に1年預け、1年後1ドル=110円になった。円換算額を求めよ（万円）。", "ans": 114.4, "tol": 0.1, "exp": "100万円÷100=1万ドル→1.04万ドル→114.4万円"}, {"cat": "外貨預金", "type": "number", "q": "1ドル=125円のとき250万円をドル預金（金利2%）に1年預け、1年後1ドル=120円になった。円換算額を求めよ（万円）。", "ans": 244.8, "tol": 0.1, "exp": "250万円÷125=2万ドル→2.04万ドル→244.8万円"}, {"cat": "先物為替", "type": "number", "q": "直物1ドル=150円、円金利1%、ドル金利3%のとき、1年先の理論先物相場を求めよ（小数第1位、円）。", "ans": 147.1, "tol": 0.1, "exp": "150×1.01/1.03=147.087...円"}, {"cat": "先物為替", "type": "number", "q": "直物1ドル=120円、円金利2%、ドル金利1%のとき、1年先の理論先物相場を求めよ（小数第1位、円）。", "ans": 121.2, "tol": 0.1, "exp": "120×1.02/1.01=121.188...円"}, {"cat": "先物為替", "type": "number", "q": "直物1ドル=100円、円金利0%、ドル金利5%のとき、1年先の理論先物相場を求めよ（小数第1位、円）。", "ans": 95.2, "tol": 0.1, "exp": "100×1.00/1.05=95.238...円"}, {"cat": "購買力平価", "type": "number", "q": "現在1ドル=100円。米国の物価が20%上昇し、日本の物価が不変の場合、購買力平価から新しい為替レートを求めよ（小数第1位、円）。", "ans": 83.3, "tol": 0.1, "exp": "100=1.2×SよりS=83.333...円"}, {"cat": "購買力平価", "type": "number", "q": "現在1ドル=120円。日本の物価が10%上昇し、米国の物価が不変の場合、購買力平価から新しい為替レートを求めよ（小数第1位、円）。", "ans": 132.0, "tol": 0.1, "exp": "日本物価上昇で円の購買力低下。120×1.10=132円"}, {"cat": "購買力平価", "type": "number", "q": "米国の商品の価格が8ドル、日本での価格が960円のとき、購買力平価レートを求めよ（円/ドル）。", "ans": 120.0, "tol": 0.05, "exp": "960÷8=120円/ドル"}, {"cat": "クロスレート", "type": "number", "q": "1ドル=150円、1ユーロ=1.2ドルのとき、1ユーロは何円か。", "ans": 180.0, "tol": 0.05, "exp": "1.2×150=180円"}, {"cat": "クロスレート", "type": "number", "q": "1ドル=150円、1ドル=2ポンドのとき、1ポンドは何円か。", "ans": 75.0, "tol": 0.05, "exp": "1ポンド=0.5ドル、0.5×150=75円"}];let quiz=[],i=0,score=0,wrong=[];const $=s=>document.querySelector(s);const cats=['全範囲',...new Set(ALL.map(x=>x.cat))];$('#cat').innerHTML=cats.map(x=>`<option>${x}</option>`).join('');
$('#formulaBtn').onclick=()=>$('#formulas').classList.toggle('hidden');$('#start').onclick=()=>{let p=[...ALL].sort(()=>Math.random()-.5);if($('#cat').value!=='全範囲')p=p.filter(x=>x.cat===$('#cat').value);quiz=p.slice(0,+$('#count').value);i=0;score=0;wrong=[];$('#setup').classList.add('hidden');$('#quiz').classList.remove('hidden');render()}
function render(){let x=quiz[i];$('#mcat').textContent=x.cat;$('#mno').textContent=`${i+1}/${quiz.length}`;$('#q').textContent=x.q;$('#ans').value='';$('#ans').disabled=false;$('#fb').className='feedback';$('#submit').classList.remove('hidden');$('#show').classList.remove('hidden');$('#next').classList.add('hidden');$('#bar').style.width=`${i/quiz.length*100}%`}
function mark(force=false){let x=quiz[i],v=parseFloat($('#ans').value);if(!force&&!Number.isFinite(v))return alert('数値を入力してください');let ok=!force&&Math.abs(v-x.ans)<=x.tol;if(ok)score++;else wrong.push(x);$('#ans').disabled=true;let f=$('#fb');f.className='feedback '+(ok?'ok':'ng');f.innerHTML=`<b>${ok?'正解':'不正解'}</b><br>答え：${x.ans}<br>${x.exp}`;$('#submit').classList.add('hidden');$('#show').classList.add('hidden');$('#next').classList.remove('hidden')}
$('#submit').onclick=()=>mark(false);$('#show').onclick=()=>mark(true);$('#next').onclick=()=>{i++;if(i>=quiz.length)finish();else render()}
function finish(){$('#quiz').classList.add('hidden');$('#result').classList.remove('hidden');$('#bar').style.width='100%';let pct=Math.round(score/quiz.length*100);$('#result').innerHTML=`<div class="score">${pct}点</div><p style="text-align:center">${score}/${quiz.length}問正解</p>${wrong.length?'<h3>復習対象</h3>'+wrong.map(x=>`<p><b>${x.q}</b><br><span class="small">${x.exp}</span></p>`).join(''):'<p style="text-align:center">全問正解です。</p>'}<div class="actions"><button class="primary" onclick="location.reload()">もう一度</button></div>`}
</script></body></html>
