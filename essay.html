<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>証券市場論 論述予想問題</title><style>
:root{--bg:#f6f7fb;--line:#e5e7eb;--blue:#2563eb;--muted:#6b7280}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;color:#111827}
header{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:3}.wrap{max-width:960px;margin:auto;padding:14px 16px}h1{font-size:20px;margin:0}
.panel,.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px;margin-top:16px}.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
select,button,textarea{font:inherit;border:1px solid var(--line);border-radius:10px;padding:10px 12px}button{font-weight:800;cursor:pointer;background:#fff}.primary{background:var(--blue);color:white;border-color:var(--blue)}
.meta{display:flex;justify-content:space-between;color:var(--muted);font-size:13px}.q{font-size:22px;line-height:1.7;font-weight:800;margin:18px 0}textarea{width:100%;min-height:180px;line-height:1.7;resize:vertical}
.model{display:none;margin-top:16px;padding:16px;border-radius:12px;background:#eef6ff;line-height:1.75}.keys{margin-top:10px}.tag{display:inline-block;background:#ede9fe;color:#5b21b6;padding:4px 8px;border-radius:999px;font-size:12px;margin:3px}
.actions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;margin-top:14px}.hidden{display:none}.small{color:var(--muted);font-size:14px}.rating{display:none;gap:10px;flex-wrap:wrap;margin-top:14px}.rating button{flex:1}.done{font-size:46px;font-weight:900;text-align:center}
</style></head><body><header><div class="wrap"><h1>証券市場論1　論述予想問題</h1></div></header><main class="wrap">
<section id="setup" class="panel"><div class="controls"><select id="cat"></select><select id="count"><option>5</option><option>10</option><option value="999">全問</option></select><button id="start" class="primary">開始</button></div><p class="small">自分で答案を書き、模範解答・キーワードと照合して自己採点します。</p></section>
<section id="quiz" class="card hidden"><div class="meta"><span id="mcat"></span><span id="mno"></span></div><div id="q" class="q"></div><textarea id="ans" placeholder="ここに自分の答案を書いてください"></textarea>
<div id="model" class="model"><b>模範解答</b><div id="modelText"></div><div class="keys"><b>必須キーワード：</b><span id="keyTags"></span></div></div>
<div class="actions"><button id="show" class="primary">模範解答を表示</button></div>
<div id="rating" class="rating"><button data-r="0">× 書けなかった</button><button data-r="1">△ 一部書けた</button><button data-r="2" class="primary">○ 書けた</button></div></section>
<section id="result" class="card hidden"></section></main><script>
const ALL=[{"cat": "金融取引の基礎", "q": "直接金融と間接金融の違いを説明せよ。", "model": "直接金融は、最終的な借り手が発行する本源的証券が最終的な貸し手へ直接移転する金融である。間接金融は、銀行などの金融仲介機関が介在し、最終的な貸し手から借り手へ資金が流れる金融である。", "keys": ["本源的証券", "金融仲介機関", "直接移転"]}, {"cat": "金融取引の基礎", "q": "発行市場と流通市場の違いを説明せよ。", "model": "発行市場は、国・企業などが新たに発行する証券を投資家が購入し、発行体が資金調達する市場である。流通市場は、既に発行された証券を投資家同士で売買する市場である。", "keys": ["新規発行", "資金調達", "既発行証券", "投資家間売買"]}, {"cat": "金融取引の基礎", "q": "市場型取引と相対型取引の違いを説明せよ。", "model": "市場型取引は多数の主体が参加し、価格や金利が需要と供給により決まる取引である。相対型取引は企業や家計が特定の金融機関と1対1で行い、条件が個別に決まる取引である。", "keys": ["多数参加", "需要供給", "1対1", "個別条件"]}, {"cat": "短期金融市場", "q": "インターバンク市場とオープン市場の違いを説明せよ。", "model": "インターバンク市場は原則として金融機関だけが参加する短期金融市場である。オープン市場は金融機関に加えて大企業や自治体なども参加でき、CD・CP・TDB・債券レポ・債券現先などが取引される。", "keys": ["金融機関のみ", "企業・自治体", "CD・CP・TDB"]}, {"cat": "短期金融市場", "q": "無担保コール翌日物が重要な理由を説明せよ。", "model": "無担保コール翌日物は、金融機関同士が無担保で翌日返済の資金を貸し借りする取引であり、インターバンク市場の中心である。また、その金利は日本銀行の金融政策上の主要な誘導対象となる。", "keys": ["金融機関同士", "翌日返済", "政策金利"]}, {"cat": "短期金融市場", "q": "CDとCPの違いを説明せよ。", "model": "CDは譲渡性預金で、満期前でも預金証書を売買できる大口の定期預金である。CPは優良企業が短期資金を調達するために発行する短期社債である。", "keys": ["譲渡性預金", "大口定期預金", "短期社債", "企業"]}, {"cat": "短期金融市場", "q": "債券レポ取引と債券現先取引の違いと共通点を説明せよ。", "model": "債券レポは現金を担保に債券を貸し借りする取引であり、債券現先は将来の買戻し・売戻しを約束して債券を売買する取引である。法形式は異なるが、いずれも実質的には債券を担保とする資金貸借である。", "keys": ["貸借", "売買", "買戻し", "実質的な資金貸借"]}, {"cat": "金融政策", "q": "金融政策の最終目標・中間目標・操作目標の関係を説明せよ。", "model": "中央銀行は物価安定などの最終目標を直接コントロールできないため、マネーストックや長期金利などの中間目標を設定する。さらに、マネタリーベース、準備預金量、短期金利など直接操作しやすい操作目標を政策手段で動かし、中間目標を通じて最終目標の達成を目指す。", "keys": ["最終目標", "中間目標", "操作目標", "2段階アプローチ"]}, {"cat": "金融政策", "q": "公開市場操作による金融緩和の仕組みを説明せよ。", "model": "日本銀行が金融市場に資金を供給すると、市場の資金量が増えて短期金利が低下しやすくなる。その結果、銀行貸出や投資を促し、経済活動や物価に影響を与える。", "keys": ["資金供給", "短期金利低下", "貸出・投資促進"]}, {"cat": "金融政策", "q": "必要準備率操作の仕組みを説明せよ。", "model": "必要準備率を引き下げると、金融機関が日銀当座預金として保有しなければならない資金が減るため、貸出余力が増える。逆に引き上げると貸出余力は減る。", "keys": ["準備率引下げ", "貸出余力増加"]}, {"cat": "金融政策", "q": "フォワード・ガイダンスとは何か。", "model": "中央銀行が将来の政策金利や金融政策の方針をあらかじめ示し、市場参加者の期待に働きかける政策である。低金利の継続を予想させることで、長期金利の低下を促す効果がある。", "keys": ["将来方針", "期待", "長期金利低下"]}, {"cat": "金融政策", "q": "量的緩和政策とは何か。", "model": "政策金利が十分に引き下げられない状況で、中央銀行が資産購入などを通じて日銀当座預金残高やマネタリーベースを増やし、金融環境を緩和する政策である。", "keys": ["資産購入", "当座預金残高", "マネタリーベース"]}, {"cat": "債券の基礎", "q": "債券とは何か。", "model": "債券とは、国や企業などの発行体が資金を借り入れた証拠として、利息の支払いと満期時の元本返済を約束して発行する債務証書である。", "keys": ["発行体", "資金調達", "利息", "元本返済"]}, {"cat": "債券の基礎", "q": "利付債と割引債の違いを説明せよ。", "model": "利付債は保有期間中に定期的なクーポンが支払われ、満期に元本が返済される。割引債は通常クーポンがなく、額面より低い価格で発行され、償還時の差額が利息に相当する。", "keys": ["クーポン", "額面以下", "償還差益"]}, {"cat": "債券の基礎", "q": "利率と利回りの違いを説明せよ。", "model": "利率は額面金額に対する1年当たりの利子の割合である。利回りは購入価格を基準として、債券投資によって得られる1年当たりの収益率を表す。", "keys": ["額面金額", "購入価格", "年間収益率"]}, {"cat": "債券価格と利回り", "q": "債券価格と市場金利が逆方向に動く理由を説明せよ。", "model": "市場金利が上昇すると、新しく発行される債券の利回りが高くなるため、低いクーポンの既発債の魅力が下がり、その価格は下落する。市場金利が低下すると、既発債の相対的な魅力が上がり、価格は上昇する。", "keys": ["市場金利上昇", "既発債の魅力低下", "価格下落"]}, {"cat": "債券価格と利回り", "q": "直接利回りと最終利回りの違いを説明せよ。", "model": "直接利回りは年間クーポンを購入価格で割ったもので、インカム・ゲインだけをみる。最終利回りは既発債を購入して満期まで保有すると仮定し、クーポンと償還差損益を含めて算出する。", "keys": ["年間クーポン", "購入価格", "償還差損益"]}, {"cat": "債券価格と利回り", "q": "リスクプレミアムとは何か。", "model": "元本や利息の返済が不確実な債券について、投資家が信用リスクを負担する見返りとして安全資産の利回りに上乗せして要求する追加的な利回りである。", "keys": ["信用リスク", "安全資産", "上乗せ利回り"]}, {"cat": "デュレーション", "q": "デュレーションとは何か。", "model": "デュレーションは、債券から得られる各キャッシュフローを現在価値で加重平均した平均回収年数を表す。また、金利が微小に変化したときの債券価格の変化の大きさを示す金利感応度としても用いられる。", "keys": ["平均回収年数", "現在価値", "金利感応度"]}, {"cat": "デュレーション", "q": "クーポン・満期とデュレーションの関係を説明せよ。", "model": "満期と割引率が同じなら、クーポンが大きいほど早期に多く回収できるためデュレーションは小さくなる。クーポンと割引率が同じなら、満期が長いほどデュレーションは大きくなる。", "keys": ["クーポン大→小", "満期長→大"]}, {"cat": "外国為替", "q": "円高・円安とは何か。", "model": "円高とは外国通貨に対して円の価値が上昇することであり、円に対する外国通貨の価値は下落する。円安はその逆で、外国通貨に対して円の価値が下落することである。", "keys": ["円の相対価値", "外国通貨"]}, {"cat": "外国為替", "q": "円高・円安が財・サービスの購入に与える影響を説明せよ。", "model": "円高では日本人が外国の財・サービスを購入しやすくなる一方、外国人にとって日本の財・サービスは割高になる。円安では日本人の海外購買力が低下する一方、外国人は日本の財・サービスを購入しやすくなる。", "keys": ["海外購買力", "外国人の日本購買"]}, {"cat": "外国為替", "q": "外国為替市場が実質的に24時間取引できる理由を説明せよ。", "model": "各市場には所定の取引時間があるが、東京、ロンドン、ニューヨークなど世界各地の市場が時差により順番に開くため、取引の中心が移動し、世界全体ではほぼ24時間取引できる。", "keys": ["時差", "市場の中心移動"]}, {"cat": "外国為替", "q": "SWIFTとCLSの役割の違いを説明せよ。", "model": "SWIFTは金融機関間で決済指図などのメッセージを標準化して送受信するネットワークである。CLSは外国為替取引で一方の通貨だけが支払われない決済リスクを削減する仕組みである。", "keys": ["メッセージング", "決済リスク削減"]}, {"cat": "外国為替", "q": "直物為替取引と先物為替取引の違いを説明せよ。", "model": "直物為替取引は原則として契約成立後2営業日以内に外貨を受け渡す取引である。先物為替取引は、将来の特定日または一定期間後に、契約時に定めた条件で外貨を受け渡す取引である。", "keys": ["2営業日以内", "将来受渡し", "契約時条件"]}, {"cat": "外国為替", "q": "金利平価とは何か。", "model": "異なる通貨の金利差を反映して、先物相場と直物相場の差が決まる関係である。裁定取引が働くことで、低金利通貨は先物プレミアム、高金利通貨は先物ディスカウントとなる。", "keys": ["金利差", "直先差", "裁定"]}, {"cat": "購買力平価", "q": "購買力平価説とは何か。", "model": "自由な貿易を前提とすると、長期的には同一の財・サービスが2国で同じ価値になるように為替レートが決まるという考え方である。一物一価の法則を国際的に拡張した理論である。", "keys": ["自由貿易", "同一財", "一物一価"]}, {"cat": "預金・貸出", "q": "銀行のバランスシート上、預金と貸出がどのように計上されるか説明せよ。", "model": "預金は銀行が預金者に返済する義務を負うため負債に計上される。貸出は銀行が借り手から元利金を回収する権利を持つため資産に計上される。", "keys": ["預金=負債", "貸出=資産"]}, {"cat": "預金・貸出", "q": "預金保険制度の目的と保護対象外預金を説明せよ。", "model": "預金保険制度は、金融機関が破綻した場合に預金者保護と資金決済の確保を図り、信用秩序を維持する制度である。譲渡性預金や外貨預金は保護対象外である。", "keys": ["預金者保護", "信用秩序", "譲渡性預金", "外貨預金"]}, {"cat": "預金・貸出", "q": "信用創造とは何か。", "model": "銀行が貸し出した資金が決済に使われ、その受取人によって再び銀行に預金され、さらに貸出に回ることで、当初の預金を上回る預金通貨が創出される仕組みである。", "keys": ["貸出", "再預金", "預金通貨の創出"]}, {"cat": "国債・社債", "q": "建設国債と特例国債の違いを説明せよ。", "model": "建設国債は財政法4条に基づき公共事業費などに充てるため発行される国債で、四条国債とも呼ばれる。特例国債は建設国債だけでは歳入不足を補えない場合に特別法に基づいて発行される赤字国債である。", "keys": ["財政法4条", "公共事業", "特別法", "赤字国債"]}, {"cat": "国債・社債", "q": "公募債と私募債の違いを説明せよ。", "model": "公募債は広く一般の投資家を対象に発行される債券である。私募債は50人未満の投資家や特定の機関投資家など、限定された投資家を対象に発行される債券である。", "keys": ["一般投資家", "限定投資家", "50人未満"]}, {"cat": "国債・社債", "q": "引受募集とは何か。", "model": "発行体が証券会社などの引受会社に債券の募集を委託し、売れ残りが出た場合には引受会社がその残額を引き取る方式である。そのため発行体は発行予定額の資金調達を確実にしやすい。", "keys": ["引受会社", "売れ残り引取", "調達額保証"]}, {"cat": "国債・社債", "q": "引受シンジケート団とは何か。", "model": "発行額の大きい債券を一社だけで引き受けるリスクを分散するため、複数の引受会社が共同で引き受ける集まりである。", "keys": ["複数引受会社", "共同引受", "リスク分散"]}, {"cat": "国債・社債", "q": "債券市場で証券会社が担うディーラー業務を説明せよ。", "model": "証券会社が顧客の売買を円滑にするため、自ら顧客の売買相手方となって債券を売買する業務である。", "keys": ["顧客の相手方", "自己売買", "流動性"]}];let quiz=[],i=0,points=0,results=[];const $=s=>document.querySelector(s);const cats=['全範囲',...new Set(ALL.map(x=>x.cat))];$('#cat').innerHTML=cats.map(x=>`<option>${x}</option>`).join('');
function start(){let p=[...ALL].sort(()=>Math.random()-.5);if($('#cat').value!=='全範囲')p=p.filter(x=>x.cat===$('#cat').value);quiz=p.slice(0,+$('#count').value);i=0;points=0;results=[];$('#setup').classList.add('hidden');$('#quiz').classList.remove('hidden');render()}
function render(){let x=quiz[i];$('#mcat').textContent=x.cat;$('#mno').textContent=`${i+1}/${quiz.length}`;$('#q').textContent=x.q;$('#ans').value='';$('#model').style.display='none';$('#rating').style.display='none';$('#show').classList.remove('hidden');$('#modelText').textContent=x.model;$('#keyTags').innerHTML=x.keys.map(k=>`<span class="tag">${k}</span>`).join('')}
$('#show').onclick=()=>{$('#model').style.display='block';$('#rating').style.display='flex';$('#show').classList.add('hidden')}
document.querySelectorAll('#rating button').forEach(b=>b.onclick=()=>{let r=+b.dataset.r;points+=r;results.push({q:quiz[i].q,r});i++;if(i>=quiz.length)finish();else render()});
$('#start').onclick=start;function finish(){$('#quiz').classList.add('hidden');$('#result').classList.remove('hidden');let pct=Math.round(points/(quiz.length*2)*100);let weak=results.filter(x=>x.r<2);$('#result').innerHTML=`<div class="done">${pct}点</div><p style="text-align:center">自己評価 ${points}/${quiz.length*2}</p>${weak.length?'<h3>復習対象</h3>'+weak.map(x=>`<p>・${x.q}</p>`).join(''):'<p style="text-align:center">全問よく書けています。</p>'}<div class="actions"><button class="primary" onclick="location.reload()">もう一度</button></div>`}
</script></body></html>
